{% extends "base.html" %}
{% block title %}Account access | Catalitium{% endblock %}

{% block meta %}
<meta name="description" content="Create a Catalitium account or sign in to save searches, access market intelligence, and manage subscriptions.">
<link rel="canonical" href="{{ url_for('register', _external=True) }}">
<meta property="og:title" content="Account access | Catalitium">
<meta property="og:description" content="Sign in or create an account for Catalitium job search, salary insights, and premium reports.">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ url_for('register', _external=True) }}">
<meta property="og:site_name" content="Catalitium">
<meta property="og:locale" content="en_US">
<meta name="twitter:title" content="Account access | Catalitium">
<meta name="twitter:description" content="Sign in or create a Catalitium account.">
{% endblock %}

{% block robots %}
<meta name="robots" content="noindex, follow">
{% endblock %}

{% block content %}
<div class="mx-auto max-w-md mt-12 px-4">
  <!-- Tab switcher -->
  <div class="flex rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden mb-6">
    <button type="button" id="tab-signup"
      class="flex-1 py-3 text-sm font-semibold transition-colors {{ 'bg-brand text-white' if tab == 'signup' else 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700' }}"
      onclick="switchTab('signup')">Create account</button>
    <button type="button" id="tab-login"
      class="flex-1 py-3 text-sm font-semibold transition-colors {{ 'bg-brand text-white' if tab == 'login' else 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700' }}"
      onclick="switchTab('login')">Sign in</button>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm">
    <form method="post" action="{{ url_for('register') }}" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="action" id="action-input" value="{{ tab }}">
      <div id="account-type-wrap" class="{{ 'hidden' if tab == 'login' else '' }}">
        <label for="account_type" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">I am joining as</label>
        <select id="account_type" name="account_type"
          class="w-full rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 dark:text-slate-200 px-4 py-3 text-base focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/40">
          <option value="candidate" {{ 'selected' if account_type == 'candidate' else '' }}>Candidate</option>
          <option value="recruiter" {{ 'selected' if account_type == 'recruiter' else '' }}>Recruiter</option>
          <option value="company" {{ 'selected' if account_type == 'company' else '' }}>Company</option>
        </select>
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email"
          class="w-full rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 dark:text-slate-200 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 py-3 text-base focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/40"
          placeholder="you@example.com">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
        <input id="password" name="password" type="password" required minlength="8"
          autocomplete="current-password"
          class="w-full rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 dark:text-slate-200 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 py-3 text-base focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/40"
          placeholder="Min 8 characters">
      </div>
      <button type="submit"
        class="w-full rounded-xl bg-brand px-4 py-3 text-base font-semibold text-white hover:bg-brand/90 transition-colors">
        <span id="btn-label">{{ 'Create account' if tab == 'signup' else 'Sign in' }}</span>
      </button>
    </form>
  </div>
</div>
<script>
function switchTab(t) {
  document.getElementById('action-input').value = t;
  document.getElementById('btn-label').textContent = t === 'signup' ? 'Create account' : 'Sign in';
  var typeWrap = document.getElementById('account-type-wrap');
  if (typeWrap) { typeWrap.classList.toggle('hidden', t === 'login'); }
  ['signup','login'].forEach(function(id) {
    var btn = document.getElementById('tab-' + id);
    if (id === t) {
      btn.classList.add('bg-brand','text-white');
      btn.classList.remove('bg-white','text-slate-600','dark:bg-slate-800','dark:text-slate-300','hover:bg-slate-50','dark:hover:bg-slate-700');
    } else {
      btn.classList.remove('bg-brand','text-white');
      btn.classList.add('bg-white','dark:bg-slate-800','text-slate-600','dark:text-slate-300','hover:bg-slate-50','dark:hover:bg-slate-700');
    }
  });
}
</script>
{% endblock %}
