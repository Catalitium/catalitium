{% extends "base.html" %}
{% block title %}Page not found | Catalitium{% endblock %}
{% block meta %}
<meta name="description" content="The page you requested is not available." />
<meta name="robots" content="noindex" />
{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-20 text-center">
  <p class="text-xs font-semibold uppercase tracking-widest text-brand mb-2">404</p>
  <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-white">Page not found</h1>
  <p class="mt-3 text-slate-600 dark:text-slate-400">The link may be broken or the page was removed.</p>
  <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
    <a href="{{ url_for('jobs.landing') }}" class="inline-flex justify-center rounded-xl bg-brand px-5 py-3 text-sm font-semibold text-white hover:opacity-90">Go home</a>
    <a href="{{ url_for('jobs.jobs') }}" class="inline-flex justify-center rounded-xl border border-slate-300 dark:border-slate-600 px-5 py-3 text-sm font-semibold text-slate-800 dark:text-slate-200 hover:border-brand">Browse jobs</a>
  </div>
</div>
{% endblock %}
