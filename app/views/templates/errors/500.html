{% extends "base.html" %}
{% block title %}Something went wrong | Catalitium{% endblock %}
{% block meta %}
<meta name="description" content="We hit an unexpected error. Please try again shortly." />
<meta name="robots" content="noindex" />
{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-20 text-center">
  <p class="text-xs font-semibold uppercase tracking-widest text-brand mb-2">Error</p>
  <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-white">Something went wrong</h1>
  <p class="mt-3 text-slate-600 dark:text-slate-400">Our team has been notified. Please try again in a few minutes.</p>
  <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
    <a href="{{ url_for('jobs.landing') }}" class="inline-flex justify-center rounded-xl bg-brand px-5 py-3 text-sm font-semibold text-white hover:opacity-90">Go home</a>
    <a href="{{ url_for('jobs.legal') }}" class="inline-flex justify-center rounded-xl border border-slate-300 dark:border-slate-600 px-5 py-3 text-sm font-semibold text-slate-800 dark:text-slate-200 hover:border-brand">Privacy &amp; safety</a>
  </div>
</div>
{% endblock %}
