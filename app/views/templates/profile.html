{% extends "base.html" %}
{% block title %}My Profile | Catalitium{% endblock %}
{% block content %}
<div class="mx-auto max-w-3xl px-4 py-10">
  <div class="mb-6">
    <p class="text-xs font-semibold uppercase tracking-widest text-slate-400">Account</p>
    <h1 class="mt-1 text-2xl font-semibold text-slate-900">My Profile</h1>
    <p class="mt-1 text-sm text-slate-500">Update your basic details for a better Catalitium experience.</p>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
    <form method="post" action="{{ url_for('profile') }}" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label for="full_name" class="block text-sm font-medium text-slate-700 mb-1">Full name</label>
        <input id="full_name" name="full_name" type="text" maxlength="120" value="{{ profile.full_name }}"
               class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-base focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/40"
               placeholder="Jane Doe">
      </div>
      <div>
        <label for="headline" class="block text-sm font-medium text-slate-700 mb-1">Professional headline</label>
        <input id="headline" name="headline" type="text" maxlength="160" value="{{ profile.headline }}"
               class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-base focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/40"
               placeholder="Senior Backend Engineer">
      </div>
      <div>
        <label for="location" class="block text-sm font-medium text-slate-700 mb-1">Location</label>
        <input id="location" name="location" type="text" maxlength="120" value="{{ profile.location }}"
               class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-base focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/40"
               placeholder="Berlin, Germany">
      </div>
      <div>
        <label for="website" class="block text-sm font-medium text-slate-700 mb-1">Website or LinkedIn</label>
        <input id="website" name="website" type="url" maxlength="250" value="{{ profile.website }}"
               class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-base focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/40"
               placeholder="https://linkedin.com/in/username">
      </div>
      <div>
        <label for="bio" class="block text-sm font-medium text-slate-700 mb-1">Short bio</label>
        <textarea id="bio" name="bio" rows="4" maxlength="500"
                  class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-base focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/40"
                  placeholder="What kind of roles are you targeting?">{{ profile.bio }}</textarea>
      </div>
      <div class="flex items-center gap-3 pt-1">
        <button type="submit"
                class="rounded-xl bg-brand px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand/90 transition-colors">
          Save profile
        </button>
        <a href="{{ url_for('studio') }}"
           class="rounded-xl border border-slate-200 px-4 py-2.5 text-sm font-medium text-slate-600 hover:border-slate-300 hover:text-slate-900 transition-colors">
          Back to studio
        </a>
      </div>
    </form>
  </div>

  <div class="mt-6 rounded-2xl border border-rose-200 bg-rose-50/40 p-6">
    <p class="text-base font-semibold text-slate-900">Account actions</p>
    <p class="mt-1 text-sm text-slate-600">Sign out quickly or permanently delete your account.</p>
    <div class="mt-4 flex flex-wrap items-center gap-3">
      <form method="post" action="{{ url_for('logout') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit"
                class="rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 hover:border-slate-300 hover:text-slate-900 transition-colors">
          Sign out
        </button>
      </form>
      <form method="post" action="{{ url_for('account_delete') }}" class="flex flex-wrap items-center gap-2" onsubmit="return confirm('Delete your account permanently? This cannot be undone.');">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="confirm_delete" required
               class="rounded-xl border border-rose-200 bg-white px-3 py-2 text-sm focus:border-rose-400 focus:outline-none focus:ring-2 focus:ring-rose-200"
               placeholder="Type DELETE">
        <button type="submit"
                class="rounded-xl border border-rose-300 bg-rose-100 px-4 py-2.5 text-sm font-semibold text-rose-700 hover:bg-rose-200 transition-colors">
          Delete account
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
