{% extends "base.html" %}
{% block title %}Payment Cancelled | Catalitium{% endblock %}

{% block content %}
<div class="mx-auto max-w-lg px-4 py-20 text-center">
  <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 dark:bg-slate-800 mb-6">
    <svg class="h-8 w-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </div>
  <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Payment cancelled</h1>
  <p class="mt-3 text-slate-500 dark:text-slate-400">No charge was made. You can go back and try again whenever you're ready.</p>
  <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-3">
    <a href="{{ url_for('post_a_job') }}"
       class="rounded-xl bg-brand px-6 py-3 text-sm font-semibold text-white hover:bg-brand/90 transition-colors shadow-md shadow-brand/20">
      Back to plans
    </a>
    <a href="{{ url_for('index') }}"
       class="rounded-xl border border-slate-200 dark:border-slate-700 px-6 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 hover:border-slate-300 dark:hover:border-slate-600 transition-colors">
      Go to homepage
    </a>
  </div>
</div>
{% endblock %}
