name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "pytest>=8" "pytest-cov>=5" "httpx>=0.27"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: postgresql://127.0.0.1:65534/ci_pytest_no_server
          FLASK_ENV: testing
        run: python -m pytest tests/ -m "not smoke" --cov=app --cov-report=term-missing
