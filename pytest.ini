[pytest]
pythonpath = .
testpaths = tests
addopts = --tb=short -q
python_files = test_*.py
filterwarnings =
    ignore:The `gotrue` package is deprecated:DeprecationWarning
    ignore:the default for the ConnectionPool .*open.*parameter:DeprecationWarning
markers =
    unit: pure unit tests, no DB or network
    integration: tests that require a real DB connection
    smoke: HTTP smoke tests against a running app or prod URL
